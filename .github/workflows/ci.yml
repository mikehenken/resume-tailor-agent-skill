name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install root dependencies
        run: npm ci
      - name: Install skill script dependencies
        run: cd skill/scripts && npm ci
      - name: Run skill tests
        run: cd skill/scripts && npm test
      - name: CLI dry-run
        run: node bin/cli.mjs --test
