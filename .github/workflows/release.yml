name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://npm.pkg.github.com'
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: cd skill/scripts && npm ci && npm test
      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-artifacts:
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - uses: actions/checkout@v4
      - name: Build platform bundles
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          for PLATFORM in cursor claude opencode; do
            mkdir -p "dist/${PLATFORM}"
            cp -r skill/ "dist/${PLATFORM}/skill/"
            cp -r "adapters/${PLATFORM}/" "dist/${PLATFORM}/adapter/"
            cp README.md LICENSE "dist/${PLATFORM}/"
            tar -czf "resume-tailor-${PLATFORM}-${VERSION}.tar.gz" -C dist "${PLATFORM}"
          done
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            resume-tailor-cursor-*.tar.gz
            resume-tailor-claude-*.tar.gz
            resume-tailor-opencode-*.tar.gz
          generate_release_notes: true
